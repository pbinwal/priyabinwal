<!DOCTYPE HTML>
<!--

  Free for personal and commercial use under the CCA 3.0 license (html5up.net/license)

-->
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>{{ page.title | default: site.title }} | Priya Binwal</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
    <noscript><link rel="stylesheet" href="{{ site.baseurl }}/assets/css/noscript.css" /></noscript>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/twenty-custom.css" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/fonts.css" />
  </head>
  <body class="{{ page.body_class | default: 'is-preload' }}">
    <div id="page-wrapper">

      <!-- Header -->
      <header id="header" class="{{ page.header_class | default: '' }}">
        <h1 id="logo"><a href="{{ site.baseurl }}/">Priya Binwal</a></h1>
        <nav id="nav">
          <ul>
            <li {% if page.url == '/' %}class="current"{% endif %}><a href="{{ site.baseurl }}/">Home</a></li>
            <li {% if page.url contains '/science' %}class="current"{% endif %}><a href="{{ site.baseurl }}/science/">Science</a></li>
            <li {% if page.url contains '/prose' %}class="current"{% endif %}><a href="{{ site.baseurl }}/prose/">Poetry &amp; Prose</a></li>
            <li {% if page.url contains '/anubhuti' %}class="current"{% endif %}><a href="{{ site.baseurl }}/anubhuti/">Anubhuti</a></li>
            <li {% if page.url contains '/ignorants' %}class="current"{% endif %}><a href="{{ site.baseurl }}/ignorants/">IgnoRants</a></li>
            <li {% if page.url contains '/contact' %}class="current"{% endif %}><a href="{{ site.baseurl }}/contact/" class="button primary">Contact</a></li>
          </ul>
        </nav>
      </header>

      <!-- Main content injected from page/markdown -->
      {{ content }}

      <!-- Footer -->
      <footer id="footer">
        <ul class="copyright">
          <li>&copy; {{ 'now' | date: "%Y" }} Priya Binwal</li>
          <li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
        </ul>
      </footer>

    </div>

    <!-- Scripts -->
    <script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/jquery.dropotron.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/jquery.scrolly.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/jquery.scrollex.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/browser.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/breakpoints.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/util.js"></script>
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
  </body>
</html>
